<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, touch-action: manipulation">
    <title>Kaiju Rescue - ¡Detén a los Kaijus!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a1a;
            overflow: hidden;
            touch-action: manipulation;
            height: 100vh;
            width: 100vw;
            font-family: 'Courier New', monospace;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            display: flex;
            gap: 6px;
            pointer-events: none;
            z-index: 10;
            flex-wrap: wrap;
        }
        .box {
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #fff;
            padding: 5px 9px;
            border-radius: 6px;
            color: #fff;
            font-size: 11px;
            font-weight: bold;
            text-shadow: 1px 1px #000;
        }
        .box .val {
            font-size: 1.2em;
        }
        #msg {
            position: absolute;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: #ffd93d;
            padding: 8px 16px;
            border-radius: 16px;
            border: 2px solid #ffd93d;
            font-size: 12px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10;
            display: none;
            white-space: nowrap;
        }
        #mobile {
            position: absolute;
            bottom: 10px;
            left: 0;
            right: 0;
            display: none;
            justify-content: center;
            gap: 12px;
            z-index: 20;
            flex-wrap: wrap;
        }
        #mobile.show {
            display: flex;
        }
        .dpad {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }
        .drow {
            display: flex;
            gap: 3px;
        }
        .dbtn {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .dbtn:active {
            background: rgba(255, 255, 255, 0.5);
        }
        .firebtn {
            width: 60px;
            height: 60px;
            background: rgba(255, 80, 80, 0.4);
            border: 3px solid #ff5050;
            border-radius: 50%;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            touch-action: manipulation;
        }
        .firebtn:active {
            background: rgba(255, 80, 80, 0.8);
        }
        #start,
        #over,
        #win {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            text-align: center;
            padding: 20px;
        }
        #over,
        #win {
            display: none;
        }
        h1 {
            font-size: 26px;
            margin-bottom: 6px;
            text-shadow: 2px 2px #000;
        }
        h2 {
            font-size: 13px;
            color: #ffd93d;
            margin-bottom: 14px;
        }
        button {
            font-family: inherit;
            font-size: 14px;
            padding: 12px 24px;
            background: #ff6b6b;
            color: #fff;
            border: 2px solid #fff;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin: 4px;
        }
        button:hover {
            background: #ff8787;
        }
        .hpbar {
            position: absolute;
            height: 6px;
            background: #ff4757;
            border-radius: 3px;
            transition: width 0.3s;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div id="ui">
        <div class="box">❤️ <span class="val" id="hp">100</span></div>
        <div class="box">🔫 <span class="val" id="am">20</span></div>
        <div class="box">👥 <span class="val" id="sv">0</span></div>
        <div class="box">🏠 <span class="val" id="bd">0</span></div>
        <div class="box">🦖 <span class="val" id="k1">100%</span></div>
        <div class="box">🐲 <span class="val" id="k2">100%</span></div>
    </div>
    <div id="msg"></div>
    <div id="mobile">
        <div class="dpad">
            <div class="drow"><button class="dbtn" id="bu">▲</button></div>
            <div class="drow">
                <button class="dbtn" id="bl">◀</button>
                <button class="dbtn" id="bd">▼</button>
                <button class="dbtn" id="br">▶</button>
            </div>
        </div>
        <button class="firebtn" id="bfire">💥<br>DISPARAR</button>
    </div>
    <div id="start">
        <h1>🦸 KAIJU RESCUE 🦖</h1>
        <h2>¡Derrota a los Kaijus y rescata civiles!</h2>
        <p style="font-size:10px;margin-bottom:10px;max-width:400px;">
            Los Kaijus destruyen la ciudad. Usa WASD/Flechas para moverte.<br>
            Clic / ESPACIO para disparar. Recoge munición 💥 y rescata 👥<br>
            ¡Si destruyen todos los edificios, pierdes!
        </p>
        <button id="bs">🚀 ¡A LUCHAR!</button>
    </div>
    <div id="over">
        <h1>💀 DERROTA</h1>
        <p id="om" style="font-size:12px;margin-bottom:12px;"></p>
        <button id="brs">🔄 REINTENTAR</button>
    </div>
    <div id="win">
        <h1>🎉 ¡VICTORIA! 🎉</h1>
        <p id="wm" style="font-size:12px;margin-bottom:12px;"></p>
        <button id="bws">🔄 JUGAR OTRA VEZ</button>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('c');
            const ctx = canvas.getContext('2d');
            const isMobile = /Mobi|Android/i.test(navigator.userAgent) || window.innerWidth < 768;

            let W, H, gameState = 'menu';
            let player, kaiju1, kaiju2;
            let bullets, particles, powerups, glitches, civilians;
            let keys = {},
                touch = { x: 0, y: 0 },
                firing = false;
            let buildings = [];
            let buildingsDestroyed, civiliansRescued, totalBuildings;
            let shake = 0;
            const CELL = 80;
            let gridCols, gridRows;

            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
                if (gameState === 'playing') initCity();
            }
            window.addEventListener('resize', resize);
            resize();

            function initCity() {
                buildings = [];
                gridCols = Math.floor(W / CELL) + 1;
                gridRows = Math.floor(H / CELL) + 1;
                for (let col = 0; col < gridCols; col++) {
                    for (let row = 0; row < gridRows; row++) {
                        if (col % 3 === 0 || row % 3 === 0) continue;
                        const b = {
                            x: col * CELL + 6,
                            y: row * CELL + 6,
                            w: CELL - 12,
                            h: CELL - 12,
                            alive: true,
                            color: ['#e8d5b7', '#d4c5a9', '#c9b99a', '#f0e0c0', '#e0c9a8'][Math.floor(Math.random() *
                                5)]
                        };
                        buildings.push(b);
                    }
                }
                totalBuildings = buildings.length;
                buildingsDestroyed = 0;
                civiliansRescued = 0;
            }

            function getStreetPos() {
                let x, y,
                    attempts = 0;
                do {
                    x = 50 + Math.random() * (W - 100);
                    y = 50 + Math.random() * (H - 100);
                    attempts++;
                } while (!isOnStreet(x, y) && attempts < 200);
                return { x, y };
            }

            function isOnStreet(x, y) {
                const col = Math.floor(x / CELL);
                const row = Math.floor(y / CELL);
                return (col % 3 === 0) || (row % 3 === 0);
            }

            function reset() {
                initCity();
                const sp = getStreetPos();
                player = { x: sp.x, y: sp.y, w: 22, h: 16, speed: 3.5, hp: 100, maxHp: 100, inv: 0, ammo: 25,
                    maxAmmo: 25, dir: 0 };
                kaiju1 = { x: W * 0.25, y: H * 0.25, vx: 1.2, vy: 0.6, size: Math.min(W, H) * 0.16, color: '#ff4757',
                    name: 'GORGO', hp: 100, maxHp: 100, stun: 0 };
                kaiju2 = { x: W * 0.7, y: H * 0.55, vx: -1, vy: -0.5, size: Math.min(W, H) * 0.14, color: '#3742fa',
                    name: 'ZORGON', hp: 100, maxHp: 100, stun: 0 };
                bullets = [];
                particles = [];
                powerups = [];
                glitches = [];
                civilians = [];
                shake = 0;
                firing = false;
                updateUI();
                document.getElementById('msg').style.display = 'none';
            }

            function updateUI() {
                document.getElementById('hp').textContent = Math.floor(player.hp);
                document.getElementById('am').textContent = player.ammo;
                document.getElementById('sv').textContent = civiliansRescued;
                document.getElementById('bd').textContent = buildingsDestroyed + '/' + totalBuildings;
                document.getElementById('k1').textContent = Math.floor(kaiju1.hp) + '%';
                document.getElementById('k2').textContent = Math.floor(kaiju2.hp) + '%';
                document.getElementById('hp').style.color = player.hp < 30 ? '#ff4757' : '#fff';
                document.getElementById('am').style.color = player.ammo < 5 ? '#ff4757' : '#ffeaa7';
            }

            function showMsg(txt) {
                const m = document.getElementById('msg');
                m.textContent = txt;
                m.style.display = 'block';
                clearTimeout(m._t);
                m._t = setTimeout(function() { m.style.display = 'none'; }, 2000);
            }

            function addParticles(x, y, n, col) {
                for (let i = 0; i < n; i++) {
                    particles.push({
                        x,
                        y,
                        vx: (Math.random() - 0.5) * 6,
                        vy: (Math.random() - 0.5) * 6 - 2,
                        life: 12 + Math.random() * 18,
                        color: col,
                        s: 2 + Math.random() * 4
                    });
                }
            }

            function addGlitch(x, y, s) {
                glitches.push({ x, y, life: 22, max: 22, size: s });
            }

            function spawnCivilians(x, y) {
                const count = 1 + Math.floor(Math.random() * 2);
                for (let i = 0; i < count; i++) {
                    civilians.push({
                        x: x + (Math.random() - 0.5) * 40,
                        y: y + (Math.random() - 0.5) * 40,
                        life: 350,
                        rescued: false
                    });
                }
            }

            function spawnPowerup(x, y, type) {
                const t = type || ['ammo', 'ammo', 'health', 'ammo'][Math.floor(Math.random() * 4)];
                const c = t === 'ammo' ? '#ffeaa7' : '#ff6b6b';
                const s = t === 'ammo' ? '💥' : '💊';
                powerups.push({ x, y, type: t, color: c, sym: s, life: 400, bob: Math.random() * Math.PI * 2 });
            }

            function fireBullet() {
                if (player.ammo <= 0) { showMsg('¡Sin munición! 🔫'); return; }
                player.ammo--;
                const angle = player.dir || 0;
                const bx = player.x + Math.cos(angle) * 14;
                const by = player.y + Math.sin(angle) * 14;
                bullets.push({
                    x: bx,
                    y: by,
                    vx: Math.cos(angle) * 8,
                    vy: Math.sin(angle) * 8,
                    life: 80
                });
                addParticles(bx, by, 3, '#ffeaa7');
                if (player.ammo <= 3) showMsg('⚠️ Munición baja: ' + player.ammo);
            }

            function update(dt) {
                if (gameState !== 'playing') return;
                const fdt = Math.min(dt, 3);

                let mx = 0,
                    my = 0;
                if (keys.ArrowLeft || keys.KeyA) mx = -1;
                if (keys.ArrowRight || keys.KeyD) mx = 1;
                if (keys.ArrowUp || keys.KeyW) my = -1;
                if (keys.ArrowDown || keys.KeyS) my = 1;
                if (touch.x !== 0 || touch.y !== 0) { mx = touch.x;
                    my = touch.y; }
                const mag = Math.sqrt(mx * mx + my * my) || 1;
                if (mag > 1) { mx /= mag;
                    my /= mag; }
                if (mx !== 0 || my !== 0) player.dir = Math.atan2(my, mx);

                let nx = player.x + mx * player.speed * fdt;
                let ny = player.y + my * player.speed * fdt;
                if (!hitsBuilding(nx, ny, 10)) { player.x = nx;
                    player.y = ny; }
                player.x = Math.max(10, Math.min(W - 10, player.x));
                player.y = Math.max(10, Math.min(H - 10, player.y));
                if (player.inv > 0) player.inv -= fdt;

                if (firing && player.ammo > 0) {
                    if (!update._fireCooldown) update._fireCooldown = 0;
                    update._fireCooldown -= fdt;
                    if (update._fireCooldown <= 0) { fireBullet();
                        update._fireCooldown = 12; }
                }

                updateKaiju(kaiju1, fdt);
                updateKaiju(kaiju2, fdt);

                const kd = Math.hypot(kaiju1.x - kaiju2.x, kaiju1.y - kaiju2.y);
                if (kd < (kaiju1.size + kaiju2.size) * 0.5) {
                    kaiju1.vx += (kaiju1.x - kaiju2.x) / kd * 3;
                    kaiju1.vy += (kaiju1.y - kaiju2.y) / kd * 3;
                    kaiju2.vx -= (kaiju1.x - kaiju2.x) / kd * 3;
                    kaiju2.vy -= (kaiju1.y - kaiju2.y) / kd * 3;
                    shake = Math.max(shake, 12);
                    addGlitch((kaiju1.x + kaiju2.x) / 2, (kaiju1.y + kaiju2.y) / 2, 55);
                }

                for (let b of bullets) {
                    b.x += b.vx * fdt;
                    b.y += b.vy * fdt;
                    b.life -= fdt;
                    if (b.life <= 0) continue;
                    for (let k of [kaiju1, kaiju2]) {
                        if (k.hp <= 0) continue;
                        if (Math.hypot(b.x - k.x, b.y - k.y) < k.size * 0.45) {
                            k.hp -= 4;
                            k.stun = 8;
                            b.life = 0;
                            addParticles(b.x, b.y, 8, '#ffd93d');
                            addGlitch(b.x, b.y, 25);
                            shake = Math.max(shake, 4);
                            if (k.hp <= 0) {
                                addParticles(k.x, k.y, 40, k.color);
                                addGlitch(k.x, k.y, 70);
                                shake = 16;
                                showMsg('💥 ¡' + k.name + ' DERROTADO!');
                                spawnPowerup(k.x, k.y, 'ammo');
                                spawnPowerup(k.x - 30, k.y - 20, 'ammo');
                                spawnPowerup(k.x + 30, k.y + 20, 'health');
                            }
                        }
                    }
                }
                bullets = bullets.filter(function(b) { return b.life > 0 && b.x > 0 && b.x < W && b.y > 0 && b.y < H; });

                for (let c of civilians) {
                    c.life -= fdt;
                    if (!c.rescued && Math.hypot(player.x - c.x, player.y - c.y) < 20) {
                        c.rescued = true;
                        civiliansRescued++;
                        addParticles(c.x, c.y, 10, '#2ecc71');
                        showMsg('👥 ¡Rescatado! Total: ' + civiliansRescued);
                    }
                }
                civilians = civilians.filter(function(c) { return c.life > 0 && !c.rescued; });

                for (let p of powerups) {
                    p.life -= fdt;
                    if (Math.hypot(player.x - p.x, player.y - p.y) < 16) {
                        if (p.type === 'ammo') {
                            player.ammo = Math.min(player.maxAmmo, player.ammo + 8);
                            showMsg('💥 +8 Munición');
                        } else {
                            player.hp = Math.min(player.maxHp, player.hp + 25);
                            showMsg('💊 +25 Vida');
                        }
                        addParticles(p.x, p.y, 10, p.color);
                        p.life = 0;
                    }
                }
                powerups = powerups.filter(function(p) { return p.life > 0; });

                for (let p of particles) { p.x += p.vx * fdt;
                    p.y += p.vy * fdt;
                    p.life -= fdt; }
                particles = particles.filter(function(p) { return p.life > 0; });
                for (let g of glitches) { g.life -= fdt; }
                glitches = glitches.filter(function(g) { return g.life > 0; });

                if (shake > 0) shake *= 0.8;
                if (shake < 0.2) shake = 0;

                if (buildingsDestroyed >= totalBuildings) return gameOver('¡Todos los edificios destruidos! 💀');
                if (kaiju1.hp <= 0 && kaiju2.hp <= 0) return gameWin();

                updateUI();
            }

            function hitsBuilding(x, y, r) {
                for (let b of buildings) {
                    if (!b.alive) continue;
                    if (x + r > b.x && x - r < b.x + b.w && y + r > b.y && y - r < b.y + b.h) return true;
                }
                return false;
            }

            function updateKaiju(k, dt) {
                if (k.hp <= 0) { k.vx *= 0.9;
                    k.vy *= 0.9; return; }
                if (k.stun > 0) { k.stun -= dt;
                    k.vx *= 0.85;
                    k.vy *= 0.85; return; }
                k.x += k.vx * dt;
                k.y += k.vy * dt;
                if (hitsBuilding(k.x, k.y, k.size * 0.4)) {
                    for (let b of buildings) {
                        if (!b.alive) continue;
                        if (k.x + k.size * 0.4 > b.x && k.x - k.size * 0.4 < b.x + b.w &&
                            k.y + k.size * 0.4 > b.y && k.y - k.size * 0.4 < b.y + b.h) {
                            b.alive = false;
                            buildingsDestroyed++;
                            spawnCivilians(b.x + b.w / 2, b.y + b.h / 2);
                            if (Math.random() < 0.5) spawnPowerup(b.x + b.w / 2, b.y + b.h / 2);
                            addParticles(b.x + b.w / 2, b.y + b.h / 2, 20, '#888');
                        }
                    }
                    k.vx *= -0.5;
                    k.vy *= -0.5;
                    shake = Math.max(shake, 10);
                    addGlitch(k.x, k.y, 40);
                }
                if (k.x < k.size * 0.3) { k.x = k.size * 0.3;
                    k.vx *= -0.7; }
                if (k.x > W - k.size * 0.3) { k.x = W - k.size * 0.3;
                    k.vx *= -0.7; }
                if (k.y < k.size * 0.3) { k.y = k.size * 0.3;
                    k.vy *= -0.7; }
                if (k.y > H - k.size * 0.3) { k.y = H - k.size * 0.3;
                    k.vy *= -0.7; }
                k.vx += (Math.random() - 0.5) * 0.35;
                k.vy += (Math.random() - 0.5) * 0.35;
                const spd = Math.sqrt(k.vx * k.vx + k.vy * k.vy);
                if (spd > 4.5) { k.vx = k.vx / spd * 4.5;
                    k.vy = k.vy / spd * 4.5; }
                if (player.inv <= 0 && Math.hypot(player.x - k.x, player.y - k.y) < k.size * 0.4) {
                    player.hp -= 22;
                    player.inv = 30;
                    shake = Math.max(shake, 10);
                    addParticles(player.x, player.y, 15, '#ff6b6b');
                    addGlitch(player.x, player.y, 40);
                    if (player.hp <= 0) return gameOver('¡Un Kaiju te aplastó! 💀');
                }
            }

            function gameOver(msg) {
                gameState = 'gameover';
                document.getElementById('om').textContent = msg + '\n👥 Rescatados: ' + civiliansRescued +
                    '\n🏠 Edificios: ' + buildingsDestroyed + '/' + totalBuildings;
                document.getElementById('over').style.display = 'flex';
                document.getElementById('mobile').classList.remove('show');
            }

            function gameWin() {
                gameState = 'win';
                document.getElementById('wm').textContent = '¡Derrotaste a ambos Kaijus!\n👥 Rescatados: ' +
                    civiliansRescued + '\n🏠 Edificios salvados: ' + (totalBuildings - buildingsDestroyed);
                document.getElementById('win').style.display = 'flex';
                document.getElementById('mobile').classList.remove('show');
            }

            function drawKaiju(k) {
                const x = k.x,
                    y = k.y,
                    s = k.size;
                ctx.save();
                ctx.translate(x, y);
                if (k.hp <= 0) ctx.globalAlpha = 0.5;
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(0, s * 0.4, s * 0.4, s * 0.1, 0, 0, Math.PI * 2);
                ctx.fill();
                const bg = ctx.createLinearGradient(0, -s * 0.3, 0, s * 0.3);
                bg.addColorStop(0, k.color);
                bg.addColorStop(0.6, '#1a0a0a');
                bg.addColorStop(1, '#0a0a0a');
                ctx.fillStyle = bg;
                ctx.beginPath();
                ctx.moveTo(-s * 0.16, -s * 0.3);
                ctx.lineTo(-s * 0.24, s * 0.1);
                ctx.quadraticCurveTo(-s * 0.28, s * 0.3, -s * 0.14, s * 0.32);
                ctx.lineTo(s * 0.14, s * 0.32);
                ctx.quadraticCurveTo(s * 0.28, s * 0.3, s * 0.24, s * 0.1);
                ctx.lineTo(s * 0.16, -s * 0.3);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.stroke();
                const hg = ctx.createRadialGradient(0, -s * 0.32, s * 0.03, 0, -s * 0.28, s * 0.16);
                hg.addColorStop(0, k.color);
                hg.addColorStop(1, '#1a0a0a');
                ctx.fillStyle = hg;
                ctx.beginPath();
                ctx.arc(0, -s * 0.3, s * 0.14, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                ctx.fillStyle = '#ff0';
                ctx.beginPath();
                ctx.ellipse(-s * 0.06, -s * 0.33, s * 0.04, s * 0.045, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(s * 0.06, -s * 0.33, s * 0.04, s * 0.045, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(-s * 0.06, -s * 0.33, s * 0.018, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(s * 0.06, -s * 0.33, s * 0.018, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#fff';
                for (let i = -2; i <= 2; i++) {
                    ctx.beginPath();
                    ctx.moveTo(i * s * 0.022, -s * 0.21);
                    ctx.lineTo(i * s * 0.022 + s * 0.009, -s * 0.25);
                    ctx.lineTo(i * s * 0.022 - s * 0.009, -s * 0.25);
                    ctx.closePath();
                    ctx.fill();
                }
                for (let i = 0; i < 4; i++) {
                    const sx = (i - 1.5) * s * 0.05;
                    const sy = -s * 0.36 - i * s * 0.03;
                    ctx.fillStyle = k.color;
                    ctx.beginPath();
                    ctx.moveTo(sx - s * 0.011, sy + s * 0.06);
                    ctx.lineTo(sx, sy);
                    ctx.lineTo(sx + s * 0.011, sy + s * 0.06);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                }
                ctx.fillStyle = '#fff';
                ctx.font = 'bold ' + Math.floor(s * 0.1) + 'px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(k.name, 0, -s * 0.46);
                if (k.hp > 0 && k.hp < k.maxHp) {
                    ctx.fillStyle = '#000';
                    ctx.fillRect(-s * 0.25, -s * 0.5, s * 0.5, 5);
                    ctx.fillStyle = '#ff4757';
                    ctx.fillRect(-s * 0.25, -s * 0.5, s * 0.5 * (k.hp / k.maxHp), 5);
                }
                ctx.globalAlpha = 1;
                ctx.restore();
            }

            function drawPlayer() {
                const x = player.x,
                    y = player.y;
                const inv = player.inv > 0 && Math.floor(player.inv / 4) % 2 === 0;
                ctx.save();
                ctx.translate(x, y);
                if (inv) ctx.globalAlpha = 0.4;
                ctx.fillStyle = '#1a1a1a';
                ctx.beginPath();
                ctx.arc(-8, 4, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(8, 4, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#2ecc71';
                ctx.fillRect(-11, -3, 22, 7);
                ctx.fillStyle = '#27ae60';
                ctx.fillRect(-4, -5, 8, 3);
                ctx.fillStyle = '#f39c12';
                ctx.fillRect(-3, -9, 6, 7);
                ctx.fillStyle = '#e74c3c';
                ctx.beginPath();
                ctx.arc(0, -13, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#3498db';
                ctx.fillRect(2, -10, 6, 6);
                ctx.globalAlpha = 1;
                ctx.restore();
            }

            function drawCivilian(c) {
                const pulse = 1 + Math.sin(Date.now() / 200) * 0.1;
                ctx.fillStyle = '#f1c40f';
                ctx.beginPath();
                ctx.arc(c.x, c.y, 7 * pulse, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                ctx.fillStyle = '#fff';
                ctx.font = '10px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('👤', c.x, c.y + 3);
            }

            function drawBuilding(b) {
                if (!b.alive) {
                    ctx.fillStyle = '#4a3a2a';
                    ctx.fillRect(b.x, b.y + b.h * 0.35, b.w, b.h * 0.65);
                    ctx.fillStyle = '#5a4a3a';
                    for (let i = 0; i < 4; i++) {
                        ctx.fillRect(b.x + (i * 18) % b.w, b.y + b.h * 0.3 + (i * 14) % (b.h * 0.5), 7, 7);
                    }
                    return;
                }
                ctx.fillStyle = b.color;
                ctx.fillRect(b.x, b.y, b.w, b.h);
                ctx.strokeStyle = '#444';
                ctx.lineWidth = 2;
                ctx.strokeRect(b.x, b.y, b.w, b.h);
                ctx.fillStyle = '#3a2a1a';
                ctx.fillRect(b.x + b.w / 2 - 3, b.y + b.h - 9, 6, 9);
                ctx.fillStyle = '#ffeaa7';
                for (let wy = 1; wy < Math.floor(b.h / 15); wy++) {
                    for (let wx = 1; wx < Math.floor(b.w / 13); wx++) {
                        if ((wx + wy) % 3 !== 0) ctx.fillRect(b.x + wx * 13, b.y + wy * 15, 4, 4);
                    }
                }
            }

            function drawGlitch(g) {
                const a = g.life / g.max;
                const r = g.size * a;
                const colors = ['255,0,255', '0,255,255', '255,255,0'];
                for (let i = 0; i < 3; i++) {
                    ctx.strokeStyle = 'rgba(' + colors[i] + ',' + (a * 0.35) + ')';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([3 + i * 2, 2]);
                    ctx.beginPath();
                    ctx.arc(g.x, g.y, r * (0.5 + i * 0.2), 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
            }

            function render() {
                ctx.clearRect(0, 0, W, H);
                let sx = 0,
                    sy = 0;
                if (shake > 0.2) { sx = (Math.random() - 0.5) * shake * 2;
                    sy = (Math.random() - 0.5) * shake * 2; }
                ctx.save();
                ctx.translate(sx, sy);
                const sky = ctx.createLinearGradient(0, 0, 0, H);
                sky.addColorStop(0, '#0a0a2e');
                sky.addColorStop(1, '#2d1b3d');
                ctx.fillStyle = sky;
                ctx.fillRect(-20, -20, W + 40, H + 40);
                ctx.fillStyle = '#2d2d2d';
                for (let col = 0; col < gridCols; col++) {
                    for (let row = 0; row < gridRows; row++) {
                        if (col % 3 === 0 || row % 3 === 0) {
                            ctx.fillRect(col * CELL, row * CELL, CELL, CELL);
                            ctx.strokeStyle = '#444';
                            ctx.lineWidth = 1;
                            ctx.strokeRect(col * CELL, row * CELL, CELL, CELL);
                        }
                    }
                }
                for (let b of buildings) drawBuilding(b);
                for (let c of civilians) drawCivilian(c);
                drawKaiju(kaiju1);
                drawKaiju(kaiju2);
                for (let b of bullets) {
                    ctx.fillStyle = '#ffeaa7';
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                }
                for (let p of powerups) {
                    const pulse = 1 + Math.sin(Date.now() / 140 + p.bob) * 0.12;
                    const sz = 13 * pulse;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, sz, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.fillStyle = '#000';
                    ctx.font = '14px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(p.sym, p.x, p.y + 4);
                }
                for (let p of particles) {
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life / 15;
                    ctx.fillRect(p.x, p.y, p.s, p.s);
                }
                ctx.globalAlpha = 1;
                for (let g of glitches) drawGlitch(g);
                drawPlayer();
                ctx.restore();
            }

            function gameLoop(ts) {
                if (!gameLoop._lt) gameLoop._lt = ts;
                const dt = ts - gameLoop._lt;
                gameLoop._lt = ts;
                if (gameState === 'playing') update(Math.min(dt, 100) / 16.667);
                render();
                requestAnimationFrame(gameLoop);
            }

            window.addEventListener('keydown', function(e) {
                keys[e.code] = true;
                if (e.code === 'Space') {
                    e.preventDefault();
                    firing = true;
                    if (gameState === 'menu') startGame();
                    if (gameState === 'gameover' || gameState === 'win') restartGame();
                }
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'KeyW', 'KeyA', 'KeyS', 'KeyD']
                    .indexOf(e.code) >= 0) e.preventDefault();
            });
            window.addEventListener('keyup', function(e) {
                keys[e.code] = false;
                if (e.code === 'Space') firing = false;
                e.preventDefault();
            });
            canvas.addEventListener('click', function(e) {
                if (gameState === 'playing') fireBullet();
            });

            function setupBtn(id, dx, dy) {
                const b = document.getElementById(id);
                if (!b) return;
                b.addEventListener('pointerdown', function(e) { e.preventDefault();
                    touch.x = dx;
                    touch.y = dy; });
                b.addEventListener('pointerup', function(e) { e.preventDefault(); if (touch.x === dx && touch.y === dy) {
                        touch.x = 0;
                        touch.y = 0; } });
                b.addEventListener('pointerleave', function() { if (touch.x === dx && touch.y === dy) { touch.x = 0;
                        touch.y = 0; } });
            }
            setupBtn('bu', 0, -1);
            setupBtn('bd', 0, 1);
            setupBtn('bl', -1, 0);
            setupBtn('br', 1, 0);
            document.getElementById('bfire').addEventListener('pointerdown', function(e) { e.preventDefault();
                firing = true; });
            document.getElementById('bfire').addEventListener('pointerup', function(e) { e.preventDefault();
                firing = false; });

            function startGame() {
                gameState = 'playing';
                reset();
                document.getElementById('start').style.display = 'none';
                document.getElementById('over').style.display = 'none';
                document.getElementById('win').style.display = 'none';
                if (isMobile) document.getElementById('mobile').classList.add('show');
                gameLoop._lt = performance.now();
                update._fireCooldown = 0;
            }

            function restartGame() {
                gameState = 'playing';
                reset();
                document.getElementById('over').style.display = 'none';
                document.getElementById('win').style.display = 'none';
                if (isMobile) document.getElementById('mobile').classList.add('show');
                gameLoop._lt = performance.now();
                update._fireCooldown = 0;
            }

            document.getElementById('bs').addEventListener('click', startGame);
            document.getElementById('brs').addEventListener('click', restartGame);
            document.getElementById('bws').addEventListener('click', restartGame);
            if (isMobile) document.getElementById('mobile').classList.add('show');
            reset();
            gameState = 'menu';
            requestAnimationFrame(gameLoop);
        })();
    </script>
</body>
</html>
